services:
  # ---------------------------------------------------------------------------
  # Keycloak 26 — Identity & Access Management
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: dxp-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://host.docker.internal:5432/${POSTGRES_DB:-dxp}
      KC_DB_USERNAME: ${POSTGRES_USER:-dxp}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-dxp_local_pass}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: true
    ports:
      - "8080:8080"
    volumes:
      - ../../infra/keycloak:/opt/keycloak/data/import
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - dxp-net

  # ---------------------------------------------------------------------------
  # Kong 3.9 — API Gateway (declarative, DB-less)
  # ---------------------------------------------------------------------------
  kong:
    image: kong:3.9
    container_name: dxp-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ../../infra/kong/kong.yml:/etc/kong/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dxp-net

networks:
  dxp-net:
    driver: bridge
